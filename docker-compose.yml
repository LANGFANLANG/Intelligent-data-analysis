services:
  postgres:
    image: postgres:16-alpine
    container_name: data_agent_pg
    environment:
      POSTGRES_USER: data_agent
      POSTGRES_PASSWORD: data_agent_pass
      POSTGRES_DB: data_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_agent -d data_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: data_agent_app
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://data_agent:data_agent_pass@postgres:5432/data_agent
      - LANGFUSE_HOST=http://langfuse-server:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    restart: unless-stopped

  # ── Langfuse LLM 观测平台 ──
  langfuse-server:
    image: langfuse/langfuse:2
    container_name: langfuse_server
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://data_agent:data_agent_pass@postgres:5432/data_agent
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3000}
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:2
    container_name: langfuse_worker
    environment:
      DATABASE_URL: postgresql://data_agent:data_agent_pass@postgres:5432/data_agent
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
