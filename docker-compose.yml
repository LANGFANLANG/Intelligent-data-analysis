services:
  postgres:
    image: postgres:16-alpine
    container_name: data_agent_pg
    environment:
      POSTGRES_USER: data_agent
      POSTGRES_PASSWORD: data_agent_pass
      POSTGRES_DB: data_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_agent -d data_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: data_agent_app
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://data_agent:data_agent_pass@postgres:5432/data_agent
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  pgdata:
